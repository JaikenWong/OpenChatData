server:
  port: 8080

spring:
  application:
    name: openchat4u
  datasource:
    url: jdbc:postgresql://localhost:5432/openchat4u
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.openchat4u

qdrant:
  host: ${QDRANT_HOST:localhost}
  http-port: ${QDRANT_HTTP_PORT:6333}
  grpc-port: ${QDRANT_GRPC_PORT:6334}

# LLM 配置 (OpenAI 兼容协议)
llm:
  base-url: ${BASE_URL:https://maas-coding-api.cn-huabei-1.xf-yun.com/v2}
  api-key: ${API_KEY:}
  model: ${MODEL_ID:astron-code-latest}

# 讯飞 Embedding 配置 (OpenAI 兼容)
embedding:
  api-key: ${EMBEDDING_API_KEY:}
  base-url: ${EMBEDDING_BASE_URL:https://maas-api.cn-huabei-1.xf-yun.com/v2/embeddings}
  model: ${EMBEDDING_MODEL:xop3qwen8bembedding}

# Rerank 配置 (默认关; 讯飞 rerank 需单独开通 model 资格)
rerank:
  enabled: ${RERANK_ENABLED:false}
  api-key: ${RERANK_API_KEY:${EMBEDDING_API_KEY:}}
  base-url: ${RERANK_BASE_URL:https://maas-api.cn-huabei-1.xf-yun.com/v2/rerank}
  model: ${RERANK_MODEL:}

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000

encryption:
  key: ${ENCRYPTION_KEY:}

logging:
  level:
    com.openchat4u: DEBUG
    com.baomidou.mybatisplus: DEBUG
