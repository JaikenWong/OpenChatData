server:
  port: 8080

spring:
  application:
    name: openchat4u
  datasource:
    url: jdbc:postgresql://localhost:5432/openchat4u
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

qdrant:
  host: localhost
  port: 6334
  grpc-port: 6334

# LLM 配置 - 支持多种模型
llm:
  # 当前使用的模型提供商
  provider: ${LLM_PROVIDER:local}  # local, deepseek, openai
  default-model: ${LLM_DEFAULT_MODEL:kimi}
  
  # 本地模型配置 (Kimi/Doubao 等)
  local:
    base-url: ${LOCAL_LLM_BASE_URL:http://10.10.38.188:13000/v1}
    api-key: ${LOCAL_LLM_API_KEY:}
    models:
      kimi: ep-20260109161345-br8vg
      doubao: Doubao-Seed-2.0-Code
  
  # DeepSeek 配置
  deepseek:
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
  
  # OpenAI 配置
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4}

# 讯飞 Embedding 配置
embedding:
  api-key: ${EMBEDDING_API_KEY:}
  base-url: ${EMBEDDING_BASE_URL:https://maas-api.cn-huabei-1.xf-yun.com/v2/embeddings}
  model: ${EMBEDDING_MODEL:xop3qwen8bembedding}

# Rerank 配置
rerank:
  api-key: ${RERANK_API_KEY:}
  base-url: ${RERANK_BASE_URL:https://maas-api.cn-huabei-1.xf-yun.com/v2/rerank}
  model: ${RERANK_MODEL:xop3qwen8bembedding}

jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expiration: 86400000

logging:
  level:
    com.openchat4u: DEBUG
    org.hibernate.SQL: DEBUG
