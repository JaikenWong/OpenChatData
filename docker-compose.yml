version: '3.8'

services:
  # PostgreSQL - 元数据存储
  postgres:
    image: postgres:15-alpine
    container_name: openchat4u-postgres
    environment:
      POSTGRES_DB: openchat4u
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - openchat4u-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openchat4u-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - openchat4u-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openchat4u-backend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/openchat4u
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      
      # Qdrant 配置
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      
      # JWT 密钥 (必须修改！)
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      
      # 加密密钥 (可选)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      
      # API Keys
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      
      # JVM 参数
      JAVA_OPTS: "-Xms512m -Xmx1g"
    ports:
      - "8080:8080"
    networks:
      - openchat4u-network
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openchat4u-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - openchat4u-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  openchat4u-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
